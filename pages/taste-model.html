<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Taste Predictor</title>
</head>
<body>
  <button onclick="window.location.href='../index.html'">← Back</button>
  <h1>Taste Predictor</h1>
  
  <button id="addFormBtn">+ Add Another Submission Form</button>

  <div id="formsContainer" style="display: flex; gap: 20px; overflow-x: auto; margin-top: 20px;"></div>

  <hr style="margin: 40px 0;" />

  <h2>Search Past Entries</h2>
  <div style="margin-bottom: 20px;">
    <label>Search by Title:</label>
    <input type="text" id="searchInput" />
    <button onclick="searchEntries()">Search</button>
  </div>
  
  <div id="searchResults" style="display: block;"></div>

  <!-- TEMPLATE FOR FORM -->
  <template id="formTemplate">
    <div style="border: 1px solid #000; padding: 10px; min-width: 300px;">
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <h2 style="margin-top: 0;">Submit Dish</h2>
        <button type="button" class="remove-btn">X</button>
      </div>
      
      <form class="submissionForm">
        <label>Title:</label><br />
        <input type="text" class="title" required /><br /><br />

        <label>Description:</label><br />
        <textarea class="description" rows="4" required></textarea><br /><br />

        <label>Image:</label><br />
        <input type="file" class="image" accept="image/*" /><br /><br />

        <button type="submit">Submit</button>
        <button type="button" class="clear-btn">Clear</button>
      </form>

      <div class="loading" style="display:none; margin-top: 10px;">
        <p>Loading...</p>
      </div>

      <div class="predictionSection" style="display:none; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px;">
        <h2 style="margin-top: 0;">Prediction</h2>
        <p>Predicted Taste Score: <strong class="predictedScore"></strong></p>
        <p>Label: <span class="predictedLabel"></span></p>
      </div>

      <div class="validationSection" style="display:none; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px;">
        <h2 style="margin-top: 0;">Validation</h2>
        <form class="validationForm">
          <label>Actual Taste Score:</label><br />
          <select class="actualScore" required>
            <option value="1">1 (no taste)</option>
            <option value="2">2 (mild taste)</option>
            <option value="3">3 (moderate taste)</option>
            <option value="4">4 (strong taste)</option>
            <option value="5">5 (intense taste)</option>
          </select><br /><br />

          <label>High Contributor Ingredients:</label><br />
          <input type="text" class="contributors" /><br /><br />

          <label>Notes:</label><br />
          <textarea class="notes" rows="4"></textarea><br /><br />

          <label>Password (required):</label><br />
          <input type="password" class="password" required /><br /><br />

          <button type="submit">Submit Validation</button>
        </form>
      </div>
    </div>
  </template>

  <script>
    const API_BASE_URL = "https://hp58lhpeil.execute-api.us-east-1.amazonaws.com";
    let searchResultsData = [];

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function createForm() {
      const template = document.getElementById("formTemplate").content.cloneNode(true);
      const card = template.querySelector("div");
      
      const submissionForm = card.querySelector(".submissionForm");
      const validationForm = card.querySelector(".validationForm");
      
      let currentItem = null;

      card.querySelector(".remove-btn").onclick = () => card.remove();
      
      card.querySelector(".clear-btn").onclick = () => {
        submissionForm.reset();
        card.querySelector(".predictionSection").style.display = "none";
        card.querySelector(".validationSection").style.display = "none";
        card.querySelector(".predictedScore").textContent = "";
        card.querySelector(".predictedLabel").textContent = "";
        currentItem = null;
      };

      submissionForm.onsubmit = async (e) => {
        e.preventDefault();
        
        card.querySelector(".loading").style.display = "block";
        card.querySelector(".predictionSection").style.display = "none";
        card.querySelector(".validationSection").style.display = "none";

        const title = card.querySelector(".title").value.trim();
        const description = card.querySelector(".description").value.trim();
        const imageFile = card.querySelector(".image").files[0];

        let imageBase64 = null;
        let imageMimeType = null;
        
        if (imageFile) {
          imageBase64 = await fileToDataUrl(imageFile);
          imageMimeType = imageFile.type;
        }

        try {
          const response = await fetch(`${API_BASE_URL}/predict`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title,
              description,
              image_base64: imageBase64,
              image_mime_type: imageMimeType
            })
          });

          const data = await response.json();

          if (!response.ok) {
            alert(data.error || "Prediction failed");
            return;
          }

          currentItem = data;

          card.querySelector(".predictedScore").textContent = data.predicted_score_1_to_5;
          card.querySelector(".predictedLabel").textContent = data.predicted_label;
          
          card.querySelector(".predictionSection").style.display = "block";
          card.querySelector(".validationSection").style.display = "block";

        } catch (err) {
          alert("Error: " + err.message);
        } finally {
          card.querySelector(".loading").style.display = "none";
        }
      };

      validationForm.onsubmit = async (e) => {
        e.preventDefault();
        
        if (!currentItem) {
          alert("No current entry to validate");
          return;
        }

        const payload = {
          item: currentItem,
          actual_score: card.querySelector(".actualScore").value,
          contributors: card.querySelector(".contributors").value.trim(),
          notes: card.querySelector(".notes").value.trim(),
          password: card.querySelector(".password").value
        };

        try {
          const response = await fetch(`${API_BASE_URL}/validate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
            alert(data.error || "Validation failed");
            return;
          }

          alert("Validation saved");
        } catch (err) {
          alert("Error: " + err.message);
        }
      };

      document.getElementById("formsContainer").appendChild(card);
    }

    let currentPage = 1;
    const itemsPerPage = 10;

    async function searchEntries(page = 1) {
      if (typeof page !== 'number') page = 1;
      const q = document.getElementById("searchInput").value.trim();
      const resContainer = document.getElementById("searchResults");
      
      if (page === 1) {
        resContainer.innerHTML = "<p>Loading...</p>";
        try {
          const response = await fetch(`${API_BASE_URL}/search`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q })
          });
          
          if (!response.ok) {
            const errText = await response.text();
            resContainer.innerHTML = "<p>Error: " + errText + "</p>";
            return;
          }

          const data = await response.json();
          searchResultsData = data.items || [];
        } catch (err) {
          resContainer.innerHTML = "<p>NetworkError: " + err.message + ". <br/><br/><b>IMPORTANT:</b> Did you remember to add the /search route to API Gateway and enable CORS for POST /search? API Gateway blocks unregistered routes by default without returning CORS headers.</p>";
          return;
        }
      }

      currentPage = page;
      resContainer.innerHTML = "";
      
      if (searchResultsData.length === 0) {
        resContainer.innerHTML = "<p>No results found.</p>";
        return;
      }

      const totalItems = searchResultsData.length;
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
      const pageData = searchResultsData.slice(startIndex, endIndex);

      const itemsDiv = document.createElement("div");
      itemsDiv.style = "display: flex; gap: 20px; overflow-x: auto; width: 100%; padding-bottom: 10px;";

      pageData.forEach((item, idx) => {
        const globalIdx = startIndex + idx;
        const div = document.createElement("div");
        div.style = "border: 1px solid #ccc; padding: 10px; min-width: 250px;";
        div.innerHTML = `
          <h3 style="margin-top: 0;">#${globalIdx + 1} - ${item.title || "Untitled"}</h3>
          <p>${item.description || ""}</p>
          <p>Predicted Taste Score: <strong>${item.predicted_score_1_to_5 || "N/A"}</strong></p>
          <p>Actual Taste Score: <strong>${item.actual_score_1_to_5 || "N/A"}</strong></p>
          <button onclick="addToCompare(${globalIdx})">Add to Comparison</button>
        `;
        itemsDiv.appendChild(div);
      });

      resContainer.appendChild(itemsDiv);

      const paginationDiv = document.createElement("div");
      paginationDiv.style = "margin-top: 10px; display: flex; gap: 10px; align-items: center;";
      
      const totalPages = Math.ceil(totalItems / itemsPerPage);
      let btnHtml = "";
      if (currentPage > 1) {
        btnHtml += `<button onclick="searchEntries(${currentPage - 1})">Prev</button> `;
      }
      btnHtml += `<span>Page ${currentPage} of ${totalPages} (${startIndex + 1}-${endIndex} of ${totalItems})</span>`;
      if (currentPage < totalPages) {
        btnHtml += `<button onclick="searchEntries(${currentPage + 1})">Next</button>`;
      }
      paginationDiv.innerHTML = btnHtml;
      resContainer.appendChild(paginationDiv);
    }

    function addToCompare(idx) {
      const item = searchResultsData[idx];
      if (!item) return;

      const div = document.createElement("div");
      div.style = "border: 1px solid #000; padding: 10px; min-width: 300px;";
      div.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: start;">
          <h2 style="margin-top: 0; color: #333;">[Past] ${item.title || "Untitled"}</h2>
          <button class="remove-btn">X</button>
        </div>
        <p>${item.description || ""}</p>
        <p>Predicted Taste Score: <strong>${item.predicted_score_1_to_5 || "N/A"}</strong></p>
        <p>Actual Taste Score: <strong>${item.actual_score_1_to_5 || "N/A"}</strong></p>
        <p>Notes: <br/>${item.notes || ""}</p>
      `;
      div.querySelector(".remove-btn").onclick = () => div.remove();
      
      document.getElementById("formsContainer").appendChild(div);
    }

    document.getElementById("addFormBtn").onclick = createForm;
    
    // Create first form
    createForm();
  </script>
</body>
</html>
